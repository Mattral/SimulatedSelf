# =============================================================
# Redis StatefulSet with AOF + RDB persistence.
# Caches active human-robot interaction session contexts.
# =============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: simulated-self
data:
  redis.conf: |
    bind 0.0.0.0
    protected-mode yes
    port 6379
    tcp-keepalive 60
    timeout 0

    # --- Persistence: AOF (per-second fsync) + RDB snapshots -----
    appendonly yes
    appendfsync everysec
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb

    save 900 1
    save 300 10
    save 60 10000

    dir /data
    rdbcompression yes
    rdbchecksum yes

    # --- Memory + eviction ---------------------------------------
    maxmemory 512mb
    maxmemory-policy allkeys-lru

    # --- Security ------------------------------------------------
    # requirepass loaded from env at startup via entrypoint wrapper.
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: simulated-self
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: redis
          image: redis:7.4-alpine
          command: ["redis-server", "/etc/redis/redis.conf"]
          ports:
            - containerPort: 6379
              name: redis
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef: { name: redis-secrets, key: password }
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/redis
          readinessProbe:
            tcpSocket: { port: redis }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: redis }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "768Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: config
          configMap: { name: redis-config }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests: { storage: 5Gi }
