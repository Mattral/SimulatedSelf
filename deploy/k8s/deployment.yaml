apiVersion: v1
kind: Namespace
metadata:
  name: simulated-self
---
# =============================================================
# Frontend (Vite SPA served by nginx)
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: simulated-self
  labels: { app: web }
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app: web }
  template:
    metadata:
      labels: { app: web }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101 # nginx
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: web
          image: ghcr.io/your-org/simulated-self-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "300m", memory: "256Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: ["ALL"] }
---
# =============================================================
# Backend API Gateway (WebSockets + LLM + Redis client)
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: simulated-self
  labels: { app: api }
spec:
  replicas: 3
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: ghcr.io/your-org/simulated-self-api:latest
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: REDIS_URL
              value: "redis://redis.simulated-self.svc.cluster.local:6379"
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef: { name: api-secrets, key: GROQ_API_KEY }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: "150m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
# =============================================================
# HPA: scale API on CPU + custom WebSocket connection metric
# =============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: simulated-self
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 65 }
    - type: Pods
      pods:
        metric: { name: websocket_active_connections }
        target: { type: AverageValue, averageValue: "250" }
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies: [{ type: Percent, value: 100, periodSeconds: 30 }]
    scaleDown:
      stabilizationWindowSeconds: 300
      policies: [{ type: Percent, value: 50, periodSeconds: 60 }]
