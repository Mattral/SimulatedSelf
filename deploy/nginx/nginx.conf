server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # --- Security headers ----------------------------------------------------
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Embedder-Policy "credentialless" always;

  # --- Compression ---------------------------------------------------------
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript
             application/wasm image/svg+xml font/woff2;
  # Brotli requires nginx built with ngx_brotli; uncomment when using the
  # `fholzer/nginx-brotli` base image.
  # brotli on;
  # brotli_types text/plain text/css application/javascript application/json image/svg+xml;

  # --- Caching: hashed assets get a year, HTML stays fresh -----------------
  location ~* \.(?:js|css|woff2?|wasm|jpg|jpeg|png|gif|svg|webp|avif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location = /healthz {
    access_log off;
    return 200 "ok\n";
  }

  # SPA fallback.
  location / {
    try_files $uri /index.html;
    add_header Cache-Control "no-cache";
  }
}
